# Re-Verse 프로덕션 결합 Compose — GCE VM용 (레지스트리 빌드, ARCHITECTURE_v2.1 §3 / 이슈 A)
# 이미지는 GitHub Actions에서 빌드해 Artifact Registry(서울)로 push하고, VM은 pull만 한다
# (2GB VM 빌드 부하 0 + 태그 롤백 가능). 배포는 .github/workflows/deploy.yml 참고.
# 사용법: ~/reverse/ 에 이 파일을 docker-compose.yml 로 복사한 뒤
#   (AR 로그인 후) docker compose pull && docker compose up -d
# 로컬 개발용(HTTP, 8080, 소스 빌드)은 docker-compose.dev.yml 사용.

services:
  api:
    image: asia-northeast3-docker.pkg.dev/reverse-502210/reverse/api:latest
    env_file:
      - ./back/reverse_backend/.env # NODE_ENV=production 포함할 것 (Swagger 비노출)
    expose:
      - "3000" # 내부 네트워크 전용 — web(nginx)만 접근
    restart: unless-stopped
    mem_limit: 1g # e2-small 2GB에서 폭주 방지 (§7 체크리스트)
    # 상태 가시성 — docker compose ps에 healthy/unhealthy 표시. node http로 /api/health 확인
    # (alpine에 curl 없음). web은 nginx resolver 패턴으로 api와 의도적 디커플링이라 depends_on은 유지.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: asia-northeast3-docker.pkg.dev/reverse-502210/reverse/web:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS 종단: Cloudflare Origin CA 인증서 (런북 §4에서 발급)
      - ./certs:/etc/nginx/certs:ro
      # 이미지에 구운 HTTP 전용 conf 를 TLS 버전으로 덮어쓴다 (백엔드 레포에서 마운트)
      - ./back/reverse_backend/deploy/nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: 256m

networks:
  default:
    name: re-verse
