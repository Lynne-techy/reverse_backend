# 프로덕션 nginx — TLS 종단(Cloudflare Origin CA) + 정적 서빙 + /api 프록시.
# 프론트 이미지의 개발용 conf(HTTP 전용)를 compose 볼륨으로 덮어쓰는 파일.
# Cloudflare 프록시 ON + SSL Full(strict) 전제 (ADR 6.10).

server {
    listen 80;
    server_name _;
    # Cloudflare가 HTTPS로 리다이렉트해주지만 오리진 직접 접근 대비 이중 방어
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Origin CA 인증서 (브라우저 신뢰 아님 — Cloudflare↔오리진 구간 전용)
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시 — URI 그대로 전달 (/api prefix 유지)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
