# 프로덕션 nginx — TLS 종단(Cloudflare Origin CA) + 정적 서빙 + /api 프록시.
# 프론트 이미지의 개발용 conf(HTTP 전용)를 compose 볼륨으로 덮어쓰는 파일.
# Cloudflare 프록시 ON + SSL Full(strict) 전제 (ADR 6.10).

server {
    listen 80;
    server_name _;
    # Cloudflare가 HTTPS로 리다이렉트해주지만 오리진 직접 접근 대비 이중 방어
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Origin CA 인증서 (브라우저 신뢰 아님 — Cloudflare↔오리진 구간 전용)
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ── 보안 응답 헤더 (하드닝 감사 2026-07-21) ──
    # 실제 프로덕션 서빙 지점(TLS 종단). 프론트 레포 public/_headers(Cloudflare Pages)와 동일.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always; # 오리진 격리(OAuth 팝업 허용)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # CSP enforce(2026-07-21): Report-Only 관찰 → 빌드 index.html에 인라인 스크립트 없음·외부 이미지 없음
    # 확인 후 승격. script-src 'self'(번들 모듈만), style/font는 jsdelivr 폰트 허용, img는 data/blob/supabase.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://oqvdcypwwvildpqnoqbr.supabase.co; connect-src 'self' https://oqvdcypwwvildpqnoqbr.supabase.co https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # 정적 해시 자산 장기 캐시 (Vite content-hash 파일명 → 안전). 라이트하우스 "cache lifetimes".
    # expires만 사용해 서버 레벨 보안 add_header 상속을 유지한다
    # (하위 location에 add_header를 두면 상위 add_header 상속이 통째로 끊긴다 — nginx 특성).
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|svg|png|jpe?g|gif|webp|ico)$ {
        expires 1y;
        access_log off;
    }

    # SPA 폴백 — index.html은 캐시하지 않음(새 자산 해시 픽업 위해 항상 재검증)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 프록시 — URI 그대로 전달 (/api prefix 유지).
    # 변수 + resolver를 쓰면 호스트명 해석이 요청 시점으로 미뤄져서,
    # api 컨테이너가 죽어 있어도 web은 뜨고 /api만 502를 반환한다.
    # (고정 proxy_pass는 nginx 기동 시 해석 실패 → web까지 같이 죽는다)
    resolver 127.0.0.11 valid=10s; # 도커 내장 DNS
    location /api/ {
        set $api_upstream http://api:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
