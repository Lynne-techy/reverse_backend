name: deploy

# 하루 한 번(19:00 UTC = 04:00 KST) VM에 최신 코드를 배포한다.
# SSH는 IAP 전용이라 러너가 GCP에 Workload Identity(키리스)로 인증한 뒤
# IAP 터널로 접속한다(2026-07-13 전환, deploy/README.md §6 참고).
# Actions 탭 > Run workflow 로 수동 실행도 가능.
#
# 필요한 GitHub Secrets (Settings > Secrets and variables > Actions):
#   WIF_PROVIDER = projects/691089332676/locations/global/workloadIdentityPools/github-pool/providers/github
#   DEPLOY_SA    = deploy@reverse-502210.iam.gserviceaccount.com
on:
  schedule:
    - cron: "0 19 * * *" # 매일 19:00 UTC = 04:00 KST
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # WIF(OIDC) 토큰 발급에 필수

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: GCP 인증 (Workload Identity — 키리스)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SA }}

      - name: gcloud 설치
        uses: google-github-actions/setup-gcloud@v2

      - name: IAP 터널로 배포 (git pull → 변경 시에만 재빌드)
        run: |
          gcloud compute ssh etri405a@reverse-vm \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --quiet \
            --command='
              set -e
              cd ~/reverse
              b0=$(git -C back/reverse_backend rev-parse HEAD)
              f0=$(git -C front/reverse_app rev-parse HEAD)
              git -C back/reverse_backend pull --ff-only
              git -C front/reverse_app pull --ff-only
              cp back/reverse_backend/deploy/docker-compose.prod.yml docker-compose.yml
              b1=$(git -C back/reverse_backend rev-parse HEAD)
              f1=$(git -C front/reverse_app rev-parse HEAD)
              if [ "$b0" != "$b1" ] || [ "$f0" != "$f1" ]; then
                echo "변경 감지 → 재빌드 (2GB VM: free -h 로 OOM 주의)"
                docker compose up -d --build
                docker image prune -f
              else
                echo "변경 없음 → 재빌드 생략, 실행 상태만 보장"
                docker compose up -d
              fi
              docker compose ps
            '
